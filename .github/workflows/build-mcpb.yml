name: Build MCP Bundle (MCPB)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Enable pnpm via corepack
      run: corepack enable pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build project
      run: pnpm run build

    - name: Prepare production dependencies for MCPB
      run: |
        rm -rf node_modules
        pnpm install --prod --frozen-lockfile --config.node-linker=hoisted

    - name: Create MCPB package
      run: |
        # Get version from manifest.json
        VERSION=$(node -p "require('./manifest.json').version")
        echo "Building MCPB for version: $VERSION"

        # Create MCPB directly in project root (mcpb pack includes dependencies)
        npx @anthropic-ai/mcpb@2.1.2 pack

        # Rename to include version
        mv microcms-mcp-server.mcpb microcms-mcp-server-v${VERSION}.mcpb

        # Also create a copy without version for consistency
        cp microcms-mcp-server-v${VERSION}.mcpb microcms-mcp-server.mcpb

    - name: Verify MCPB creation
      run: |
        if [ ! -f microcms-mcp-server.mcpb ]; then
          echo "Error: MCPB file failed to be created"
          exit 1
        fi
        ls -la *.mcpb

    - name: Upload MCPB as artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: microcms-mcp-server-mcpb
        path: |
          microcms-mcp-server.mcpb
          microcms-mcp-server-v*.mcpb

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download MCPB artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: microcms-mcp-server-mcpb

    - name: List downloaded files
      run: ls -la

    - name: Create Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        if [ ! -f microcms-mcp-server.mcpb ]; then
          echo "Error: microcms-mcp-server.mcpb not found"
          exit 1
        fi
        shopt -s nullglob
        versioned=(microcms-mcp-server-v*.mcpb)
        if [ "${#versioned[@]}" -eq 0 ]; then
          echo "Error: no microcms-mcp-server-v*.mcpb file found"
          exit 1
        fi
        gh release create "${{ github.ref_name }}" \
          microcms-mcp-server.mcpb "${versioned[@]}" \
          --generate-notes \
          --repo "${{ github.repository }}"
