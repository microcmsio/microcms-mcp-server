services:
  microcms-mcp:
    build: .
    ports:
      - '${MCP_HTTP_PORT:-3000}:3000'
    environment:
      - MCP_TRANSPORT=http
      - MCP_HTTP_PORT=3000
      - MCP_HTTP_HOST=0.0.0.0
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      - MICROCMS_SERVICES=${MICROCMS_SERVICES:-}
      - MICROCMS_SERVICE_ID=${MICROCMS_SERVICE_ID:-}
      - MICROCMS_API_KEY=${MICROCMS_API_KEY:-}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
