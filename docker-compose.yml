services:
  microcms-mcp:
    build: .
    ports:
      - '3000:3000'
    environment:
      - MCP_TRANSPORT=http
      - MCP_HTTP_PORT=3000
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - MICROCMS_SERVICES=${MICROCMS_SERVICES}
      - MICROCMS_SERVICE_ID=${MICROCMS_SERVICE_ID}
      - MICROCMS_API_KEY=${MICROCMS_API_KEY}
